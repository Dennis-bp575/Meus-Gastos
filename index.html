<!DOCTYPE html>
<html lang="pt-br">
<head>
<!-- Configurações de App (PWA) -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- Manifest Simplificado (Simula o F11) -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Meus Gastos Pro</title>

  <!-- Tailwind e Google Fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://googleapis.com" rel="stylesheet">

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>
  
  <style>
    body { font-family: 'Inter', sans-serif; }
    .aba-ativa {
      border-bottom: 3px solid #2563eb;
      color: #2563eb;
      font-weight: 700;
    }
    .botao-grande { min-height: 64px; }
  </style>
</head>

<body class="bg-slate-100 flex justify-center min-h-screen">

  <div class="w-full max-w-md bg-white shadow-2xl flex flex-col rounded-none sm:rounded-3xl overflow-hidden">

    <!-- ABAS -->
    <div class="flex border-b bg-white sticky top-0 z-10">
      <button onclick="mudarAba(-1)" id="tab-1"
        class="flex-1 py-4 text-slate-400 text-xs uppercase tracking-wider transition">
        Anterior
      </button>
      <button onclick="mudarAba(0)" id="tab0"
        class="flex-1 py-4 aba-ativa text-xs uppercase tracking-wider transition">
        Este Mês
      </button>
      <button onclick="mudarAba(1)" id="tab1"
        class="flex-1 py-4 text-slate-400 text-xs uppercase tracking-wider transition">
        Próximo
      </button>
    </div>

    <div class="p-6 flex-1">

      <!-- TOTAL -->
      <div class="bg-gradient-to-br from-blue-600 to-indigo-700 text-white rounded-3xl p-8 mb-8 shadow-xl">
        <div class="text-xs opacity-70 uppercase tracking-widest mb-1">
          Total Acumulado
        </div>
        <div id="displayTotal" class="text-4xl font-extrabold tracking-tight">
          R$ 0,00
        </div>
        <div id="nomeMes" class="text-sm mt-2 opacity-80 font-medium">
          MAIO 2026
        </div>
      </div>

      <!-- BOTÃO VOZ -->
      <button onclick="iniciarMicrofone()"
        class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white rounded-2xl botao-grande mb-8
               flex items-center justify-center gap-3 shadow-lg shadow-blue-200
               active:scale-95 transition-all">
        <span class="text-2xl">🎤</span>
        <span class="text-lg font-bold tracking-wide">LANÇAR GASTO POR VOZ</span>
      </button>

      <!-- LISTA -->
      <div id="listaGastos" class="space-y-4 pb-24"></div>

    </div>
  </div>

  <script>
    let abaAtual = 0;
    let gastos = JSON.parse(localStorage.getItem("gastos_pro")) || [];

    function getMesReferencia(offset) {
      const d = new Date();
      d.setMonth(d.getMonth() + offset);
      const meses = ["JANEIRO","FEVEREIRO","MARÇO","ABRIL","MAIO","JUNHO","JULHO","AGOSTO","SETEMBRO","OUTUBRO","NOVEMBRO","DEZEMBRO"];
      return `${meses[d.getMonth()]} ${d.getFullYear()}`;
    }

    function mudarAba(index) {
      abaAtual = index;
      document.querySelectorAll('[id^="tab"]').forEach(el =>
        el.classList.remove('aba-ativa','text-slate-900'));
      document.getElementById('tab' + index).classList.add('aba-ativa');
      renderizar();
    }

    function renderizar() {
		const container = document.getElementById('listaGastos');
		const displayTotal = document.getElementById('displayTotal');
		const nomeMesDisplay = document.getElementById('nomeMes');
		const mesNome = getMesReferencia(abaAtual);

		nomeMesDisplay.innerText = mesNome;
		container.innerHTML = "";
		let total = 0;

		const gastosFiltrados = gastos.filter(g => g.mesRef === mesNome);

		if (gastosFiltrados.length === 0) {
			container.innerHTML =
			`<div class="text-center text-slate-300 py-12 italic">
				Sem gastos em ${mesNome.toLowerCase()}
			</div>`;
		}

		// Rodando cada gasto do mês selecionado
		gastosFiltrados.forEach(item => {
			total += item.valor;

			// CORREÇÃO 1: Criamos o container do item na memória para o clique funcionar individualmente
			const divContainerGasto = document.createElement('div');
			divContainerGasto.className = "flex flex-col border-b border-slate-100 py-1";

			// CORREÇÃO 2: Montamos o HTML com a Linha Principal e a Sublista juntas dentro dele
			divContainerGasto.innerHTML = `
			<!-- LINHA PRINCIPAL -->
			<div class="flex items-center justify-between px-3 h-10 w-full">
				<span class="text-right font-bold text-slate-700 min-w-[20px]">${item.dia}</span>
				<p>&nbsp</p>

				<!-- NOME (45%) -->
				<div class="w-[45%] font-semibold text-slate-800 truncate text-left leading-none">
					${item.nome}
				</div>

				<!-- VALOR (30%) -->
				<div class="w-[30%] text-right font-bold text-slate-700 leading-none">
					R$ ${item.valor.toFixed(2)}
				</div>
				<p>&nbsp</p>

				<!-- AÇÕES (25%) -->
				<div class="w-[25%] flex justify-end gap-1 items-center">
					<!-- A Seta só aparece se houver mais de 1 detalhe cadastrado -->
						${item.detalhes && item.detalhes.length > 1 ? `
						<button class="btn-seta p-1 hover:bg-slate-100 rounded-full leading-none text-[14px]">
							▼
						</button>
					` : '<div class="w-[24px]"></div>'}

					<button onclick="editarValor(${item.id})" class="p-1 hover:bg-slate-100 rounded-full leading-none">
						<span style="font-size: 14px;">✏️</span>
					</button>

					<button onclick="excluirItem(${item.id})" class="p-1 hover:bg-red-50 rounded-full leading-none">
						<span style="font-size: 14px;">🗑️</span>
					</button>
				</div>
			</div>

		<!-- SUBLISTA DE DETALHES -->
		<div class="sublista-detalhes hidden pl-12 pb-2 pt-1 text-sm text-slate-500 flex flex-col gap-1">
			${item.detalhes ? item.detalhes.map(d => `
			<div class="flex justify-between w-[75%] border-l-2 border-slate-200 pl-2">
				<span>↳ Lançamento (Dia ${d.dia})</span>
				<span class="font-semibold">R$ ${d.valor.toFixed(2)}</span>
			</div>
			`).join('') : ''}
		</div>
		`;

		// CORREÇÃO 3: Agora conseguimos achar a seta e a sublista deste item específico
		const botaoSeta = divContainerGasto.querySelector('.btn-seta');
		const sublista = divContainerGasto.querySelector('.sublista-detalhes');

		if (botaoSeta) {
		  botaoSeta.addEventListener('click', () => {
			const estaEscondido = sublista.classList.contains('hidden');
			if (estaEscondido) {
			  sublista.classList.remove('hidden');
			  botaoSeta.textContent = '▲';
			} else {
			  sublista.classList.add('hidden');
			  botaoSeta.textContent = '▼';
			}
		});
    }

    // Adiciona o bloco completo configurado dentro da sua lista real na tela
    container.appendChild(divContainerGasto);
  }); // <--- Fechamento correto do forEach

  displayTotal.innerText =
    `R$ ${total.toLocaleString('pt-BR',{minimumFractionDigits:2})}`;

  localStorage.setItem("gastos_pro", JSON.stringify(gastos));
}


  function incluirPorTexto(texto) {
	  // 1. Limpa termos de moeda e símbolos primeiro para não confundir
	  // 1. Limpa as palavras de moeda normais (sua linha original)
	  let textoLimpo = texto.replace(/reais?|R\$|BRL|[$]|centavos?/gi, "").trim();
	
	  // 2. Transforma a palavra " e " (isolada entre números) em um ponto decimal
	  textoLimpo = textoLimpo.replace(/\s+e\s+/gi, " ");

	  // 3. Segurança extra: Se o usuário falar "20,50" (com vírgula), transforma em ponto
	  textoLimpo = textoLimpo.replace(/,/g, " ");
	
	  // 2. Procura por todos os números na frase
	  // Captura números como "10", "10,50", "10.50"
	  const numerosEncontrados = textoLimpo.match(/\d+([\.,]\d+)?/g);

	  if (!numerosEncontrados) return alert("Diga o valor claramente.");
	
	  let valor;
	  if (numerosEncontrados.length >= 2 && textoLimpo.includes(`${numerosEncontrados[0]} e ${numerosEncontrados[1]}`)) {
	    // Se a pessoa disse "10 e 50", somamos a parte inteira com a decimal
	    const parteInteira = parseFloat(numerosEncontrados[0].replace(",", "."));
	    const parteDecimal = parseFloat(numerosEncontrados[1].replace(",", ".")) / 100;
	    valor = parteInteira + parteDecimal;
  	} else {
	    // Caso contrário, pega o último número falado (padrão anterior)
	    valor = parseFloat(numerosEncontrados[numerosEncontrados.length - 1].replace(",", "."));
	  }

	  // 3. Limpa o nome removendo os números e o "e" que sobra entre eles
	  const nome = textoLimpo.replace(/\d+([\.,]\d+)?/g, "")
	                         .replace(/\b e \b/gi, "") // remove o " e " solto
	                         .trim() || "Gasto sem nome";
	
		const tudoCerto = confirm(`
			Nome: ${nome}
			Valor: ${valor}
		
			Está correto?
		`);
		if (tudoCerto) {
			  const mesRefAtual = getMesReferencia(abaAtual);
			  const indexExistente = gastos.findIndex(g => 
			    g.nome.toLowerCase() === nome.toLowerCase() && 
			    g.mesRef === mesRefAtual
			  );
		
			  let valorFinal = valor;
			  if (indexExistente !== -1) {
			    valorFinal += gastos[indexExistente].valor;
			    gastos.splice(indexExistente, 1);
			  }
		
			  gastos.unshift({
			  id: Date.now(),
			  nome: nome,
			  valor: valorFinal, // Seu valor total inicial
			  dia: new Date().getDate(),
			  mesRef: mesRefAtual,
		  
				  // Aqui entra a sua nova sublista "detalhes"
				  detalhes: [
				    { 
				      idLancamento: Date.now(), 
				      valor: valorFinal,          // Usa a mesma variável do valor acima
				      dia: new Date().getDate()  // Usa o mesmo dia do gasto principal
				    }
				  ]
				});
		
		  	renderizar();
		}
	}

    function iniciarMicrofone() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) return alert("Navegador incompatível.");
      const r = new SR();
      r.lang = "pt-BR";
      r.onresult = e => incluirPorTexto(e.results[0][0].transcript);
      r.start();
    }

    function excluirItem(id) {
      if (confirm("Excluir este gasto?")) {
        gastos = gastos.filter(i => i.id !== id);
        renderizar();
      }
    }

    function editarValor(id) {
      const novo = prompt("Novo valor:");
      if (novo) {
        gastos = gastos.map(i =>
          i.id === id ? {...i, valor: parseFloat(novo.replace(",",".")) || 0} : i
        );
        renderizar();
      }
    }

    renderizar();
  </script>

</body>
</html>
