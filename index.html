<!DOCTYPE html>
<html lang="pt-br">
<head>
<!-- Configurações de App (PWA) -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- Manifest Simplificado (Simula o F11) -->
<link rel="manifest" href="data:application/manifest+json,{'display':'standalone','orientation':'portrait'}">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Meus Gastos Pro</title>

  <!-- Tailwind e Google Fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://googleapis.com" rel="stylesheet">

  <style>
    body { font-family: 'Inter', sans-serif; }
    .aba-ativa {
      border-bottom: 3px solid #2563eb;
      color: #2563eb;
      font-weight: 700;
    }
    .botao-grande { min-height: 64px; }
  </style>
</head>

<body class="bg-slate-100 flex justify-center min-h-screen">

  <div class="w-full max-w-md bg-white shadow-2xl flex flex-col rounded-none sm:rounded-3xl overflow-hidden">

    <!-- ABAS -->
    <div class="flex border-b bg-white sticky top-0 z-10">
      <button onclick="mudarAba(-1)" id="tab-1"
        class="flex-1 py-4 text-slate-400 text-xs uppercase tracking-wider transition">
        Anterior
      </button>
      <button onclick="mudarAba(0)" id="tab0"
        class="flex-1 py-4 aba-ativa text-xs uppercase tracking-wider transition">
        Este Mês
      </button>
      <button onclick="mudarAba(1)" id="tab1"
        class="flex-1 py-4 text-slate-400 text-xs uppercase tracking-wider transition">
        Próximo
      </button>
    </div>

    <div class="p-6 flex-1">

      <!-- TOTAL -->
      <div class="bg-gradient-to-br from-blue-600 to-indigo-700 text-white rounded-3xl p-8 mb-8 shadow-xl">
        <div class="text-xs opacity-70 uppercase tracking-widest mb-1">
          Total Acumulado
        </div>
        <div id="displayTotal" class="text-4xl font-extrabold tracking-tight">
          R$ 0,00
        </div>
        <div id="nomeMes" class="text-sm mt-2 opacity-80 font-medium">
          MAIO 2026
        </div>
      </div>

      <!-- BOTÃO VOZ -->
      <button onclick="iniciarMicrofone()"
        class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white rounded-2xl botao-grande mb-8
               flex items-center justify-center gap-3 shadow-lg shadow-blue-200
               active:scale-95 transition-all">
        <span class="text-2xl">🎤</span>
        <span class="text-lg font-bold tracking-wide">LANÇAR GASTO POR VOZ</span>
      </button>

      <!-- LISTA -->
      <div id="listaGastos" class="space-y-4 pb-24"></div>

    </div>
  </div>

  <script>
    let abaAtual = 0;
    let gastos = JSON.parse(localStorage.getItem("gastos_pro")) || [];

    function getMesReferencia(offset) {
      const d = new Date();
      d.setMonth(d.getMonth() + offset);
      const meses = ["JANEIRO","FEVEREIRO","MARÇO","ABRIL","MAIO","JUNHO","JULHO","AGOSTO","SETEMBRO","OUTUBRO","NOVEMBRO","DEZEMBRO"];
      return `${meses[d.getMonth()]} ${d.getFullYear()}`;
    }

    function mudarAba(index) {
      abaAtual = index;
      document.querySelectorAll('[id^="tab"]').forEach(el =>
        el.classList.remove('aba-ativa','text-slate-900'));
      document.getElementById('tab' + index).classList.add('aba-ativa');
      renderizar();
    }

    function renderizar() {
      const container = document.getElementById('listaGastos');
      const displayTotal = document.getElementById('displayTotal');
      const nomeMesDisplay = document.getElementById('nomeMes');
      const mesNome = getMesReferencia(abaAtual);

      nomeMesDisplay.innerText = mesNome;
      container.innerHTML = "";
      let total = 0;

      const gastosFiltrados = gastos.filter(g => g.mesRef === mesNome);

      if (gastosFiltrados.length === 0) {
        container.innerHTML =
          `<div class="text-center text-slate-300 py-12 italic">
            Sem gastos em ${mesNome.toLowerCase()}
          </div>`;
      }

      gastosFiltrados.forEach(item => {
        total += item.valor;
        container.innerHTML += `
          <div class="bg-white border border-slate-100 rounded-xl py-2 px-3 shadow-sm flex items-center justify-between gap-2">
            <div class="flex justify-between items-start mb-4">
             <div class="w-[20%] flex flex-col items-center justify-center border-r border-slate-100 pr-2">
        <span class="text-sm font-black text-slate-700">${item.dia || '--'}</span>
              </div>
              <div class="w-[50%] font-semibold text-slate-800 truncate text-left">
      ${item.nome}
              </div>
              <div class="w-[25%] font-extrabold text-blue-600 whitespace-nowrap text-center">
      R$ ${item.valor.toFixed(2)}
               </div>
            </div>
            <!-- BOTOES ALINHADOS À ESQUERDA -->
            <div class="w-[15%] flex justify-end gap-1">
              <button onclick="editarValor(${item.id})" class="p-2 hover:bg-slate-100 rounded-full transition" title="Editar"> ✏️
               </button>
              <button onclick="excluirItem(${item.id})" class="p-2 hover:bg-red-50 rounded-full transition" title="Excluir"> 🗑️
               </button>
            </div>
          </div>`;
      });

      displayTotal.innerText =
        `R$ ${total.toLocaleString('pt-BR',{minimumFractionDigits:2})}`;

      localStorage.setItem("gastos_pro", JSON.stringify(gastos));
    }

    function incluirPorTexto(texto) {
      const numeros = texto.match(/\d+[\.,]?\d*/g);
      if (!numeros) return alert("Diga o valor claramente.");

      const valor = parseFloat(numeros[numeros.length - 1].replace(",", "."));
      const nome = texto.replace(/\d+[\.,]?\d*/g,"")
                        .replace(/reais?/gi,"").trim();

      gastos.unshift({
        id: Date.now(),
        nome: nome || "Gasto sem nome",
        valor: valor,
        dia: new Date().getDate(), // <--- Adiciona o dia atual (ex: 9)
        mesRef: getMesReferencia(abaAtual)
      });
      renderizar();
    }

    function iniciarMicrofone() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) return alert("Navegador incompatível.");
      const r = new SR();
      r.lang = "pt-BR";
      r.onresult = e => incluirPorTexto(e.results[0][0].transcript);
      r.start();
    }

    function excluirItem(id) {
      if (confirm("Excluir este gasto?")) {
        gastos = gastos.filter(i => i.id !== id);
        renderizar();
      }
    }

    function editarValor(id) {
      const novo = prompt("Novo valor:");
      if (novo) {
        gastos = gastos.map(i =>
          i.id === id ? {...i, valor: parseFloat(novo.replace(",",".")) || 0} : i
        );
        renderizar();
      }
    }

    renderizar();
  </script>

</body>
</html>
